version: '3.8'

services:
  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "8081:8081"
    networks:
      - monitor-net

  orders-service:
    build: ./orders-service
    container_name: orders-service
    ports:
      - "8082:8082"
    networks:
      - monitor-net

  payments-service:
    build: ./payments-service
    container_name: payments-service
    ports:
      - "8083:8083"
    networks:
      - monitor-net

  proxy-service:
    build: ./proxy-service
    container_name: proxy-service
    ports:
      - "8080:8080"
    networks:
      - monitor-net
    depends_on:
      - inventory-service
      - orders-service
      - payments-service

networks:
  monitor-net:
    driver: bridge
